name: Use Vale to test markdown for spelling and prose styles

on: [push]

jobs:
  prose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Vale linter
        uses: vale-cli/vale-action@2.1.2
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
